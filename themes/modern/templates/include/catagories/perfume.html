<section class="w-full bg-black py-[2px] my-[1px]" style="background-color: #000; overflow: hidden;">

    <div class="grid grid-cols-1 md:grid-cols-2 gap-[1px]" style="display: grid; background-color: #ffffff">

        <a href="{% url 'category_detail' 'women-perfume' %}" 
           class="group relative block w-full overflow-hidden" 
           style="height: 80vh; min-height: 500px; text-decoration: none; position: relative;">
            
            <div class="w-full h-full transition-transform duration-[2s] cubic-bezier(0.2, 1, 0.2, 1) group-hover:scale-105"
                 style="width: 100%; h-full; transition: transform 2s cubic-bezier(0.2, 1, 0.2, 1);">
                <img src="/media/catagories/female.png" 
                     alt="Women's Collection"
                     class="w-full h-full object-cover grayscale-[30%] group-hover:grayscale-0 transition-all duration-700"
                     style="width: 100%; height: 100%; object-fit: cover; filter: grayscale(30%); transition: filter 0.7s ease;">
            </div>

            <div class="absolute inset-0 bg-gradient-to-b from-black/20 via-transparent to-black/60" 
                 style="position: absolute; inset: 0; background: linear-gradient(180deg, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0) 40%, rgba(0,0,0,0.8) 100%);">
            </div>

            <div class="absolute inset-0 flex flex-col items-center justify-end pb-16 px-6 text-center" 
                 style="position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; padding-bottom: 64px;">
                
                <p class="text-white/60 uppercase tracking-[0.5em] text-[10px] mb-4 translate-y-2 group-hover:translate-y-0 transition-transform duration-700" 
                   style="color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: 0.5em; font-size: 10px; margin-bottom: 16px; transition: transform 0.7s ease;">
                    The Essence of Elegance
                </p>
                
                <h2 class="text-white text-4xl md:text-5xl font-extralight tracking-[0.2em] uppercase mb-6" 
                    style="color: #fff; font-size: 40px; font-weight: 200; letter-spacing: 0.2em; text-transform: uppercase; margin: 0;">
                    Women
                </h2>

                <div class="h-[1px] bg-white transition-all duration-700 w-12 group-hover:w-32" 
                     style="height: 1px; background-color: #fff; width: 48px; transition: width 0.7s ease;">
                </div>
            </div>
        </a>

        <a href="{% url 'category_detail' 'men-perfume' %}" 
           class="group relative block w-full overflow-hidden" 
           style="height: 80vh; min-height: 500px; text-decoration: none; position: relative;">
            
            <div class="w-full h-full transition-transform duration-[2s] cubic-bezier(0.2, 1, 0.2, 1) group-hover:scale-105"
                 style="width: 100%; h-full; transition: transform 2s cubic-bezier(0.2, 1, 0.2, 1);">
                <img src="/media/catagories/sav.png" 
                     alt="Men's Collection"
                     class="w-full h-full object-cover grayscale-[30%] group-hover:grayscale-0 transition-all duration-700"
                     style="width: 100%; height: 100%; object-fit: cover; filter: grayscale(30%); transition: filter 0.7s ease;">
            </div>

            <div class="absolute inset-0 bg-gradient-to-b from-black/20 via-transparent to-black/60" 
                 style="position: absolute; inset: 0; background: linear-gradient(180deg, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0) 40%, rgba(0,0,0,0.8) 100%);">
            </div>

            <div class="absolute inset-0 flex flex-col items-center justify-end pb-16 px-6 text-center" 
                 style="position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; padding-bottom: 64px;">
                
                <p class="text-white/60 uppercase tracking-[0.5em] text-[10px] mb-4 translate-y-2 group-hover:translate-y-0 transition-transform duration-700" 
                   style="color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: 0.5em; font-size: 10px; margin-bottom: 16px; transition: transform 0.7s ease;">
                    Bold & Sophisticated
                </p>
                
                <h2 class="text-white text-4xl md:text-5xl font-extralight tracking-[0.2em] uppercase mb-6" 
                    style="color: #fff; font-size: 40px; font-weight: 200; letter-spacing: 0.2em; text-transform: uppercase; margin: 0;">
                    Men
                </h2>

                <div class="h-[1px] bg-white transition-all duration-700 w-12 group-hover:w-32" 
                     style="height: 1px; background-color: #fff; width: 48px; transition: width 0.7s ease;">
                </div>
            </div>
        </a>

    </div>

</section>
