<!-- Original Hero Banner - Backup -->
<style>
    /* Hero Section */
    .hero {
        position: relative;
        min-height: 85vh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        background: linear-gradient(135deg,
            rgba(26, 26, 26, 0.95) 0%,
            rgba(139, 115, 85, 0.9) 50%,
            rgba(183, 110, 121, 0.85) 100%),
            url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600"><defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:rgb(212,175,55);stop-opacity:0.1" /><stop offset="100%" style="stop-color:rgb(139,115,85);stop-opacity:0.05" /></linearGradient></defs><rect width="1200" height="600" fill="url(%23grad)"/><circle cx="200" cy="150" r="100" fill="rgba(212,175,55,0.03)"/><circle cx="900" cy="400" r="150" fill="rgba(183,110,121,0.03)"/><circle cx="600" cy="250" r="80" fill="rgba(139,115,85,0.02)"/></svg>');
        background-size: cover;
        background-position: center;
    }

    .hero::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: radial-gradient(circle at 30% 50%, rgba(212, 175, 55, 0.15) 0%, transparent 50%),
                    radial-gradient(circle at 70% 50%, rgba(183, 110, 121, 0.15) 0%, transparent 50%);
        animation: pulseGlow 8s ease-in-out infinite;
    }

    @keyframes pulseGlow {
        0%, 100% { opacity: 0.5; }
        50% { opacity: 1; }
    }

    .hero-content {
        position: relative;
        z-index: 2;
        text-align: center;
        color: white;
        max-width: 900px;
        padding: 0 20px;
        animation: fadeInUp 1s ease-out;
    }

    @keyframes fadeInUp {
        from {
            opacity: 0;
            transform: translateY(40px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .hero-subtitle {
        font-size: 1.1rem;
        letter-spacing: 4px;
        text-transform: uppercase;
        color: var(--color-gold);
        margin-bottom: 1.5rem;
        font-weight: 500;
        animation: fadeIn 1.2s ease-out 0.3s both;
    }

    .hero h1 {
        font-size: 5rem;
        font-weight: 700;
        margin-bottom: 1.5rem;
        line-height: 1.1;
        background: linear-gradient(135deg, #ffffff 0%, var(--color-gold) 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        animation: fadeIn 1.4s ease-out 0.5s both;
    }

    .hero p {
        font-size: 1.3rem;
        margin-bottom: 3rem;
        color: rgba(255, 255, 255, 0.9);
        line-height: 1.8;
        animation: fadeIn 1.6s ease-out 0.7s both;
    }

    .hero-buttons {
        display: flex;
        gap: 1.5rem;
        justify-content: center;
        flex-wrap: wrap;
        animation: fadeIn 1.8s ease-out 0.9s both;
    }

    .hero-buttons .btn {
        font-size: 1rem;
        padding: 1rem 2.5rem;
    }

    @media (max-width: 768px) {
        .hero h1 {
            font-size: 3rem;
        }
        .hero p {
            font-size: 1.1rem;
        }
    }

    /* Floating Elements */
    .floating {
        position: absolute;
        animation: float 6s ease-in-out infinite;
    }

    .floating-1 {
        top: 20%;
        left: 10%;
        animation-delay: 0s;
    }

    .floating-2 {
        top: 60%;
        right: 15%;
        animation-delay: 2s;
    }

    .floating-3 {
        bottom: 20%;
        left: 15%;
        animation-delay: 4s;
    }

    @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-20px); }
    }
</style>

<!-- Hero Section -->
<section class="hero">
    <!-- Floating Decorative Elements -->
    <div class="floating floating-1" style="font-size: 3rem; opacity: 0.2;">💫</div>
    <div class="floating floating-2" style="font-size: 4rem; opacity: 0.15;">✨</div>
    <div class="floating floating-3" style="font-size: 2.5rem; opacity: 0.2;">🌸</div>

    <div class="hero-content">
        <div class="hero-subtitle">Luxury Fragrances</div>
        <h1>Experience<br>Olfactory Excellence</h1>
        <p>Discover our exquisite collection of premium fragrances, meticulously crafted and inspired by the world's most iconic perfumes. Each scent tells a story of elegance, sophistication, and timeless beauty.</p>
        <div class="hero-buttons">
            <a href="{% url 'product_list' %}" class="btn btn-gold">Explore Collection</a>
            <a href="#featured" class="btn btn-outline" style="color: white; border-color: white;">View Featured</a>
        </div>
    </div>
</section>
